<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Summer Cut</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Summer Cut" />
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  :root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#86868b;--fill:#eeeef1;--blue:#0071e3;--red:#ff3b30}
  @media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#98989d;--fill:#2c2c2e;--blue:#0a84ff;--red:#ff453a}}
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center}
  #lock{display:none;flex-direction:column;align-items:center;gap:14px;padding:30px;max-width:320px;width:100%}
  #lock img{width:84px;height:84px;border-radius:20px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:2px 0 0}
  .sub{color:var(--muted);font-size:13.5px;margin:-6px 0 8px}
  input[type=password]{width:100%;background:var(--fill);border:1.5px solid transparent;color:var(--text);
    border-radius:12px;padding:13px 14px;font-size:17px;text-align:center;letter-spacing:2px;font-family:inherit}
  input[type=password]:focus{outline:none;border-color:var(--blue)}
  button{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;
    font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
  .rem{display:flex;gap:8px;align-items:center;font-size:13.5px;color:var(--muted)}
  .rem input{width:17px;height:17px;accent-color:var(--blue)}
  #err{color:var(--red);font-size:13px;font-weight:600;min-height:18px;margin:0}
  .shake{animation:sh .4s}
  @keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
</style>
</head>
<body>
<form id="lock">
  <img src="icon-180.png" alt="" />
  <h1>Summer Cut</h1>
  <div class="sub">Enter your passcode</div>
  <input type="password" id="pass" autocomplete="current-password" autofocus />
  <p id="err"></p>
  <button type="submit">Unlock</button>
  <label class="rem"><input type="checkbox" id="rem" checked />Remember this device</label>
</form>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function keyFromPass(pass){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(P.salt), iterations:300000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function open_(key, remember){
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct)); // throws on wrong passcode
  if(remember){
    const raw = await crypto.subtle.exportKey('raw', key);
    localStorage.setItem('summercut-key', btoa(String.fromCharCode(...new Uint8Array(raw))));
  }
  const html = new TextDecoder().decode(pt);
  try{ sessionStorage.setItem('sc-src', html); }catch(e){} // plaintext source for the in-app Garage editor
  document.open(); document.write(html); document.close();
}
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('summercut-key');
  if(saved){
    try{
      const key = await crypto.subtle.importKey('raw', b64(saved), {name:'AES-GCM'}, true, ['decrypt']);
      await open_(key, false);
      return;
    }catch(e){ localStorage.removeItem('summercut-key'); }
  }
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('pass').focus();
});
document.getElementById('lock').addEventListener('submit', async e => {
  e.preventDefault();
  const f = document.getElementById('lock');
  try{
    const key = await keyFromPass(document.getElementById('pass').value);
    await open_(key, document.getElementById('rem').checked);
  }catch(err){
    document.getElementById('err').textContent = 'Wrong passcode';
    document.getElementById('pass').value = '';
    f.classList.remove('shake'); void f.offsetWidth; f.classList.add('shake');
  }
});
if('serviceWorker' in navigator && location.protocol === 'https:') navigator.serviceWorker.register('sw.js');
